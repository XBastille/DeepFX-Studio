{% extends 'layouts/layout.html' %}
{% load static %}

{% block body %}
  <nav class="shadow-md pt-10 md:pt-20">
    <div class="max-w-screen-lg flex flex-wrap items-center justify-between mx-auto p-4">
      <a href="/" class="flex items-center space-x-3">
        <img src="{% static 'images/logo.jpeg' %}" alt="logo" class="w-10 h-10" />
        <span class="text-xl text-white font-bold">DeepFX Studio</span>
      </a>
      <div class="flex flex-row md:order-2 space-x-3">
        <a href="{% url 'app:signin' %}" class="inline-flex items-center justify-center rounded-md border border-white bg-transparent hover:bg-white hover:text-black text-base font-medium text-white px-4 py-2 transition-colors duration-200 ease-in-out">Sign In</a>
      </div>
    </div>
  </nav>
  <section class="max-w-7xl mx-auto text-white p-20">
    <p style="font-family: 'Silkscreen', sans-serif;" class="text-xl md:text-4xl font-extrabold">Generate unique images tailored to your specifications</p>
    <div class="border-[0.8px] border-white w-[20vw] my-10"></div>
    <div class="overflow-hidden">
      <p class="w-full text-xs md:w-[30vw] md:text-sm font-mono">AI-driven platform to generate, convert, and mutate images into stunning stuxxing art pieces, empowering your creativity and vision.</p>
    </div>
  </section>
{% endblock %}
