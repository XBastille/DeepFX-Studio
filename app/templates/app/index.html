{% extends "layouts/layout.html" %}
{% load static %}

{% block body %}
  <nav class="shadow-md pt-20"> <!-- Added mt-6 here -->
    <div class="max-w-screen-lg flex flex-wrap items-center justify-between mx-auto p-4">
      <a href="/" class="flex items-center space-x-3">
        <img src={% static 'images/logo.jpeg' %} alt="logo" class="w-10 h-10">
        <span class="text-xl text-white font-bold">DeepFX Studio</span>
      </a>
      <div class="flex flex-row md:order-2 space-x-3 md:space-x-0 align-middle justify-center items-center gap-4">
        <a href={% url "app:signin" %} class="inline-flex items-center justify-center rounded-md border border-dark bg-dark px-3 py-1 text-center text-base font-medium text-white hover:border-body-color hover:bg-body-color disabled:border-gray-3 disabled:bg-gray-3 disabled:text-dark-5 dark:border-dark-2 dark:bg-dark-2">
          Sign in
        </a>
      </div>
    </div>
  </nav>
  <section class="max-w-7xl mx-auto text-white p-20">
    <p style="font-family: 'Silkscreen', sans-serif;" class="text-5xl font-extrabold">Generate unique images tailored to your specifications</p>
  </section>
{% endblock %}
