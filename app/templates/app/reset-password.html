{% extends 'layouts/layout.html' %}
{% load static %}

{% block title %}
  Reset Password |
{% endblock %}

{% block navbar %}
{% endblock %}

{% block body %}
<section class="bg-gray-950 min-h-screen flex items-center justify-center">
  <div class="md:w-[55%] sm:w-full max-w-md px-8 py-6 rounded-lg shadow-lg">
    <a href="{% url 'app:index_view' %}" class="flex items-center mb-6 text-2xl font-semibold text-white">
      <img src="{% static 'images/logo.jpeg' %}" alt="logo" class="w-10 h-10 mr-2">
      DeepFX Studio
    </a>
    <h2 class="mb-5 text-2xl font-bold leading-tight text-white">Change Password</h2>
    
    <form class="space-y-6" action="#">
      <div class="flex flex-col md:flex-row md:space-x-6">
    
        <!-- New Password Field -->
        <div class="w-full md:w-1/2 mt-4">
          <label for="password" class="block mb-2 text-sm font-medium text-gray-300">New Password</label>
          <input type="password" name="password" id="password" class="w-full p-2.5 rounded-lg border border-gray-600 bg-gray-700 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="••••••••" required>
        </div>
      </div>
    
      <!-- Confirm Password Field -->
      <div class="w-full md:w-1/2 mt-4">
        <label for="confirm-password" class="block mb-2 text-sm font-medium text-gray-300">Confirm Password</label>
        <input type="password" name="confirm-password" id="confirm-password" class="w-full p-2.5 rounded-lg border border-gray-600 bg-gray-700 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="••••••••" required>
      </div>
      
      <!-- Submit Button -->
      <div class="flex justify-center my-4 border border-gray-400 rounded-md">
        <button type="submit" class="w-full py-4 text-sm font-semibold text-gray-900 bg-transparent hover:bg-gray-900 hover:text-white transition-colors duration-300 ease-in-out">
          Reset Password
        </button>
      </div>
    </form>   
  </div>
</section>
{% endblock %}
